name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  windows-powershell:
    name: Windows PowerShell 5.1
    runs-on: windows-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: Install pinned PowerShell analysis tool
        shell: powershell
        run: |
          $gallery = Get-PSRepository -Name PSGallery -ErrorAction Stop
          $galleryUri = [uri]$gallery.SourceLocation
          if ($galleryUri.Scheme -ne 'https' -or $galleryUri.Host -ne 'www.powershellgallery.com') {
            throw "Unexpected PSGallery source: $($gallery.SourceLocation)"
          }
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted -ErrorAction Stop
          Install-Module PSScriptAnalyzer -RequiredVersion 1.25.0 -Scope CurrentUser -Force -AllowClobber -Repository PSGallery -ErrorAction Stop

      - name: Validate PowerShell syntax
        shell: powershell
        run: |
          $tokens = $null
          $errors = $null
          [System.Management.Automation.Language.Parser]::ParseFile(
            (Resolve-Path '.\Get-AD-ATLAS.ps1'),
            [ref]$tokens,
            [ref]$errors
          ) | Out-Null
          $errors | Format-Table -AutoSize
          if ($errors.Count -gt 0) { throw "$($errors.Count) PowerShell parser error(s) detected." }

      - name: Run PSScriptAnalyzer
        shell: powershell
        run: |
          Import-Module PSScriptAnalyzer -RequiredVersion 1.25.0 -Force
          $findings = @(Invoke-ScriptAnalyzer -Path '.\Get-AD-ATLAS.ps1' -Severity Warning,Error)
          $findings | Format-Table -AutoSize
          if ($findings.Count -gt 0) { throw "$($findings.Count) PSScriptAnalyzer finding(s) detected." }

  powershell:
