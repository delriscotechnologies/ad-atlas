name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        shell: [powershell, pwsh]

    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Install pinned PowerShell analysis tools
        shell: ${{ matrix.shell }}
        run: |
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module Pester -RequiredVersion 6.0.0 -Scope CurrentUser -Force -AllowClobber -Repository PSGallery
          Install-Module PSScriptAnalyzer -RequiredVersion 1.25.0 -Scope CurrentUser -Force -AllowClobber -Repository PSGallery

      - name: Run Pester tests
        shell: ${{ matrix.shell }}
        run: |
          Import-Module Pester -RequiredVersion 6.0.0 -Force
          $configuration = New-PesterConfiguration
          $configuration.Run.Path = '.\tests'
          $configuration.Run.PassThru = $true
          $configuration.Output.Verbosity = 'Detailed'
          $result = Invoke-Pester -Configuration $configuration
          if ($result.FailedCount -gt 0) { throw "$($result.FailedCount) Pester test(s) failed." }

      - name: Run PSScriptAnalyzer
        shell: ${{ matrix.shell }}
        run: |
          Import-Module PSScriptAnalyzer -RequiredVersion 1.25.0 -Force
          $findings = @(Invoke-ScriptAnalyzer -Path '.\Get-AD-ATLAS.ps1' -Severity Warning,Error)
          $findings | Format-Table -AutoSize
          if ($findings.Count -gt 0) { throw "$($findings.Count) PSScriptAnalyzer finding(s) detected." }
