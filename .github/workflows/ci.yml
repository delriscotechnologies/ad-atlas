name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  windows-powershell:
    name: Windows PowerShell 5.1
    runs-on: windows-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: Install pinned PowerShell analysis tools
        shell: powershell
        run: |
          $gallery = Get-PSRepository -Name PSGallery -ErrorAction Stop
          $galleryUri = [uri]$gallery.SourceLocation
          if ($galleryUri.Scheme -ne 'https' -or $galleryUri.Host -ne 'www.powershellgallery.com') {
            throw "Unexpected PSGallery source: $($gallery.SourceLocation)"
          }
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted -ErrorAction Stop
          Install-Module Pester -RequiredVersion 6.0.0 -Scope CurrentUser -Force -AllowClobber -Repository PSGallery -ErrorAction Stop
          Install-Module PSScriptAnalyzer -RequiredVersion 1.25.0 -Scope CurrentUser -Force -AllowClobber -Repository PSGallery -ErrorAction Stop

      - name: Run Pester tests
        shell: powershell
        run: |
          Import-Module Pester -RequiredVersion 6.0.0 -Force
          $configuration = New-PesterConfiguration
          $configuration.Run.Path = '.\tests'
          $configuration.Run.PassThru = $true
          $configuration.Output.Verbosity = 'Detailed'
          $configuration.Filter.ExcludeTag = @('Integration')
          $result = Invoke-Pester -Configuration $configuration
          if ($result.FailedCount -gt 0) { throw "$($result.FailedCount) Pester test(s) failed." }

      - name: Run PSScriptAnalyzer
        shell: powershell
        run: |
          Import-Module PSScriptAnalyzer -RequiredVersion 1.25.0 -Force
          $findings = @(Invoke-ScriptAnalyzer -Path '.\Get-AD-ATLAS.ps1' -Severity Warning,Error)
          $findings | Format-Table -AutoSize
          if ($findings.Count -gt 0) { throw "$($findings.Count) PSScriptAnalyzer finding(s) detected." }

  powershell:
